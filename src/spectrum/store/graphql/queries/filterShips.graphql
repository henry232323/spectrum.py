query filterShips(
      $fromId: Int
      $toId: Int
      $fromFilters: [FilterConstraintValues]
      $toFilters: [FilterConstraintValues]
    ) {
      from(to: $toId, filters: $fromFilters) {
        ships {
          id
        }
      }
      to(from: $fromId, filters: $toFilters) {
        featured {
          reason
          style
          tagLabel
          tagStyle
          footNotes
          shipId
        }
        ships {
          id
          skus {
            id
            price
            upgradePrice
            unlimitedStock
            showStock
            available
            availableStock
          }
        }
      }
    }
